<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Mythili Ladies Tailor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #fff7fb; color: #333; }
    header { background: linear-gradient(135deg, #8b1e6d, #5b2c83); color: white; padding: 24px 20px; display: flex; justify-content: space-between; align-items: center; }
    .btn { display: inline-block; padding: 10px 16px; border-radius: 10px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
    .btn-light { background: white; color: #5b2c83; }
    .btn-danger { background: #d11a2a; color: white; }
    .section { padding: 30px 20px; max-width: 1200px; margin: auto; }
    .panel, .card { background: white; border-radius: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
    .panel { padding: 24px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
    .card img { width: 100%; height: 260px; object-fit: cover; border-radius: 18px 18px 0 0; }
    .card-body { padding: 16px; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; }
    .price { display: inline-block; background: #f7d8ee; color: #8b1e6d; padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: bold; margin: 8px 0 12px; }
    .small-btn { width: 100%; padding: 10px; border: none; border-radius: 10px; background: #5b2c83; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Admin Panel</h1>
      <p>Manage collection images and prices</p>
    </div>
    <button class="btn btn-danger" onclick="logoutAdmin()">Logout</button>
  </header>

  <section class="section">
    <div class="panel">
      <h2 style="margin-bottom: 16px; color: #5b2c83;">Upload New Collection</h2>
      <input type="text" id="newTitle" placeholder="Collection Name" />
      <input type="text" id="newPrice" placeholder="Price" />
      <textarea id="newDesc" rows="4" placeholder="Collection Description"></textarea>
      <input type="file" id="newImage" accept="image/*" />
      <button class="btn btn-light" onclick="addCollection()">Add New Collection</button>
    </div>

    <div class="grid" id="collectionGrid"></div>
  </section>

  <script>
    if (localStorage.getItem('tailorAdminLogin') !== 'true') {
      window.location.href = 'login.html';
    }

    const defaultCollections = [
      {
        title: 'Designer Blouse Stitching',
        price: 'Custom Price',
        desc: 'Elegant designer blouse stitching with premium finishing.',
        image: '/mnt/data/image(93).png'
      },
      {
        title: 'Back Neck Design Blouse',
        price: 'Custom Price',
        desc: 'Modern back neck blouse designs stitched to your style.',
        image: '/mnt/data/image(94).png'
      },
      {
        title: 'Traditional Silk Blouse',
        price: 'Custom Price',
        desc: 'Traditional silk blouse stitching for sarees and functions.',
        image: '/mnt/data/image(95).png'
      }
    ];

    let collections = JSON.parse(localStorage.getItem('tailorCollections') || 'null') || defaultCollections;

    function saveCollections() {
      localStorage.setItem('tailorCollections', JSON.stringify(collections));
    }

    function renderCollections() {
      const grid = document.getElementById('collectionGrid');
      grid.innerHTML = collections.map((item, index) => `
        <div class="card">
          <img src="${item.image}" alt="${item.title}" />
          <div class="card-body">
            <input value="${item.title}" onchange="updateField(${index}, 'title', this.value)" />
            <input value="${item.price}" onchange="updateField(${index}, 'price', this.value)" />
            <textarea rows="3" onchange="updateField(${index}, 'desc', this.value)">${item.desc}</textarea>
            <div class="price">${item.price}</div>
            <input type="file" accept="image/*" onchange="updateImage(${index}, event)" />
            <button class="small-btn" onclick="removeCollection(${index})">Delete Collection</button>
          </div>
        </div>
      `).join('');
    }

    function updateField(index, field, value) {
      collections[index][field] = value;
      saveCollections();
      renderCollections();
    }

    function updateImage(index, event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        collections[index].image = e.target.result;
        saveCollections();
        renderCollections();
      };
      reader.readAsDataURL(file);
    }

    function addCollection() {
      const title = document.getElementById('newTitle').value.trim();
      const price = document.getElementById('newPrice').value.trim() || 'Custom Price';
      const desc = document.getElementById('newDesc').value.trim();
      const file = document.getElementById('newImage').files[0];

      if (!title || !desc || !file) {
        alert('Please fill collection name, description, and image');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        collections.unshift({ title, price, desc, image: e.target.result });
        saveCollections();
        renderCollections();
        document.getElementById('newTitle').value = '';
        document.getElementById('newPrice').value = '';
        document.getElementById('newDesc').value = '';
        document.getElementById('newImage').value = '';
      };
      reader.readAsDataURL(file);
    }

    function removeCollection(index) {
      collections.splice(index, 1);
      saveCollections();
      renderCollections();
    }

    function logoutAdmin() {
      localStorage.removeItem('tailorAdminLogin');
      window.location.href = 'login.html';
    }

    renderCollections();
    localStorage.setItem('tailorAdminLogin', 'true')
  </script>
</body>
</html>
